name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev

      - name: 安装 Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: 接受 Android SDK 许可证
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: 设置内存优化环境变量
        run: |
          echo "P4A_NUM_JOBS=1" >> $GITHUB_ENV
          echo "GRADLE_OPTS=-Xmx1536m" >> $GITHUB_ENV

      - name: 构建 APK
        run: buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MOSS-APK
          path: bin/*.apk
